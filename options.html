<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japanese Highlight to Katakana - Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Japanese Highlight to Katakana</h1>
      <p>
        Set your Yahoo Developer Client ID for Furigana API conversion.
      </p>

      <label for="clientId">Yahoo Client ID</label>
      <input id="clientId" type="password" placeholder="Yahoo Client ID" autocomplete="off" />

      <button id="saveBtn" type="button">Save</button>
      <p id="status" aria-live="polite"></p>

      <hr />

      <h2>Bubble Settings</h2>

      <label for="bubbleBgColor">Background Color</label>
      <input id="bubbleBgColor" type="color" />

      <label for="bubblePosition">Position</label>
      <select id="bubblePosition">
        <option value="bottom">Below selection (Bottom)</option>
        <option value="top">Above selection (Top)</option>
        <option value="fixed-bottom">Fixed to page bottom</option>
      </select>

      <label for="bubbleDuration">Auto-Disappear (seconds)</label>
      <input id="bubbleDuration" type="number" min="0" max="60" step="1" placeholder="0 = never" />
      <p class="hint" style="margin-top:-6px;">Set to 0 to keep the bubble visible until selection is cleared.</p>

      <hr />
      <p class="hint">
        Create your app at Yahoo Developer Network and copy Client ID.
      </p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
